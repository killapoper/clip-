<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Klyro Downloader</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Фоновые анимированные градиенты (Liquid Glass эффект) -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="app-wrapper">
        <!-- Tab: Home -->
        <div id="tab-home" class="tab-content active">
            <div class="glass-panel">
                <h1 data-i18n="app_title">Klyro</h1>
                <p class="subtitle" data-i18n="app_subtitle">Тут вы можете скачать любой медиафайл</p>

                <!-- iOS стиль переключателя -->
                <div class="segmented-control">
                    <input type="radio" name="format" id="video" value="video" checked>
                    <label for="video" class="segment-label" data-i18n="format_video">Видео</label>

                    <input type="radio" name="format" id="audio" value="audio">
                    <label for="audio" class="segment-label" data-i18n="format_audio">Аудио (MP3)</label>

                    <div class="segment-highlight"></div>
                </div>

                <!-- Выбор качества (только для видео) -->
                <div id="qualitySelector" class="quality-selector">
                    <input type="radio" name="quality" id="q1080" value="1080" checked>
                    <label for="q1080">1080p</label>

                    <input type="radio" name="quality" id="q720" value="720">
                    <label for="q720">720p</label>

                    <input type="radio" name="quality" id="q480" value="480">
                    <label for="q480">480p</label>
                </div>

                <!-- Минималистичное поле ввода -->
                <div class="input-container">
                    <input type="url" id="urlInput" class="link-input" placeholder="Вставьте ссылку..."
                        data-i18n-placeholder="input_placeholder" autocomplete="off">
                    <!-- Умная кнопка внутри поля -->
                    <button class="action-btn-inside" id="pasteBtn" aria-label="Вставить">
                        <svg class="act-icon" viewBox="0 0 24 24">
                            <path
                                d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm7 16H5V5h2v3h10V5h2v14z" />
                        </svg>
                    </button>
                </div>

                <!-- Смарт Превью -->
                <div id="previewCard" class="preview-card">
                    <img id="previewImg" src="" alt="Thumbnail">
                    <div class="preview-info">
                        <h3 id="previewTitle">Загрузка данных...</h3>
                        <p id="previewDetail"></p>
                    </div>
                </div>

                <button id="downloadBtn" class="main-btn">
                    <div class="spinner"></div>
                    <span id="btnText" data-i18n="btn_download">Скачать файл</span>
                </button>

                <button id="cancelBtn" class="main-btn secondary-btn" style="display: none;">
                    <span data-i18n="btn_cancel">Отменить</span>
                </button>

                <!-- Стильный iOS прогресс-бар -->
                <div id="progressContainer" class="progress-container">
                    <div class="progress-info">
                        <span id="progressText">0%</span>
                        <span id="progressStatus">Загружаю файл...</span>
                    </div>
                    <div class="progress-track">
                        <div id="progressBar" class="progress-bar"></div>
                    </div>
                </div>

                <div id="statusMsg" class="status"></div>
            </div>
        </div>

        <!-- Tab: Converter -->
        <div id="tab-converter" class="tab-content">
            <div class="glass-panel">
                <h1 data-i18n="nav_converter">Конвертор</h1>
                <p class="subtitle" data-i18n="converter_subtitle">Скоро здесь будет конвертация медиа</p>
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" class="empty-icon">
                        <path
                            d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83" />
                    </svg>
                </div>
            </div>
        </div>

        <!-- Tab: Settings -->
        <div id="tab-settings" class="tab-content">
            <div class="glass-panel">
                <h1 data-i18n="nav_settings">Настройки</h1>
                <p class="subtitle" data-i18n="settings_subtitle">Управление вашими предпочтениями</p>
                <div class="settings-list">
                    <div class="settings-item">
                        <span data-i18n="settings_version">Версия</span>
                        <span class="settings-value badge">1.1.7</span>
                    </div>
                    <div class="settings-item lang-toggle" id="langToggle">
                        <span data-i18n="settings_lang">Язык</span>
                        <span class="settings-value" id="currentLangDisplay">Русский</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Стик меню (Bottom Nav) -->
        <nav class="bottom-bar">
            <div class="nav-item active" data-tab="home">
                <div class="nav-bubble"></div>
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span data-i18n="nav_home">Главная</span>
            </div>
            <div class="nav-item" data-tab="converter">
                <div class="nav-bubble"></div>
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 1l4 4-4 4"></path>
                    <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                    <path d="M7 23l-4-4 4-4"></path>
                    <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                </svg>
                <span data-i18n="nav_converter">Конвертор</span>
            </div>
            <div class="nav-item" data-tab="settings">
                <div class="nav-bubble"></div>
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
                <span data-i18n="nav_settings">Настройки</span>
            </div>
        </nav>

        <script src="app.js"></script>
</body>

</html>
